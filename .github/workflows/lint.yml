name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: "install.sh uninstall.sh"
      - name: Run ShellCheck on hook scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: plugin/hooks/scripts

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            *.md
            plugin/**/*.md

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: jq empty plugin/.claude-plugin/plugin.json
      - name: Validate marketplace.json
        run: jq empty .claude-plugin/marketplace.json
      - name: Validate settings-hooks.json
        run: jq empty plugin/settings-hooks.json
      - name: Validate hooks.json
        run: jq empty plugin/hooks/hooks.json

  test-hooks:
    name: Hook Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run hook tests
        run: bash tests/test-hooks.sh
